<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <clipPath id="rounded-bg">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Letter N (drawn first so dog-ear covers it) -->
  <!-- Right vertical stroke -->
  <rect x="670" y="200" width="90" height="580" rx="20" fill="white"/>
  <!-- Diagonal stroke -->
  <polygon points="310,200 400,200 760,720 760,780 670,780" fill="white"/>
  <!-- Left stroke as pencil -->
  <rect x="265" y="200" width="90" height="480" rx="20" fill="white"/>
  <polygon points="265,680 355,680 310,800" fill="white"/>
  <line x1="310" y1="760" x2="310" y2="800" stroke="#4338CA" stroke-width="4" stroke-linecap="round"/>
  <rect x="265" y="200" width="90" height="30" rx="10" fill="#C7D2FE"/>
  <rect x="265" y="660" width="90" height="8" fill="#C7D2FE"/>
  <rect x="265" y="672" width="90" height="8" fill="#C7D2FE"/>

  <!-- Dog-ear fold (on top of the N) -->
  <g clip-path="url(#rounded-bg)">
    <!-- Folded triangle (paper) - opaque -->
    <polygon points="644,0 1024,0 1024,380" fill="#E0E7FF"/>
    <!-- Shadow/crease - opaque -->
    <polygon points="644,0 1024,380 644,380" fill="#7C7FD4"/>
  </g>

  <!-- Checkbox on the fold, partly tucked behind the crease -->
  <!-- Box outline -->
  <rect x="770" y="70" width="130" height="130" rx="22" fill="white" stroke="#22C55E" stroke-width="10"/>
  <!-- Checkmark -->
  <polyline points="800,135 832,170 900,95" fill="none" stroke="#22C55E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Purple background covers bottom-left of checkbox (crease overlap) -->
  <g clip-path="url(#rounded-bg)">
    <polygon points="644,0 1024,380 644,380" fill="#7C7FD4"/>
  </g>
</svg>
