<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>NslNotes</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="splash" style="position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366F1,#4338CA);">
        <style>
          @keyframes splash-spin {
            to { transform: rotate(360deg); }
          }
          .splash-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: splash-spin 0.8s linear infinite;
          }
        </style>
        <img src="/src/assets/logo.svg" alt="" width="80" height="80" style="margin-bottom:24px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.15));" />
        <h1 style="margin:0 0 32px;font-size:1.5rem;font-weight:600;letter-spacing:-0.025em;color:white;font-family:system-ui,sans-serif;">NslNotes</h1>
        <div class="splash-spinner"></div>
      </div>
    </div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
